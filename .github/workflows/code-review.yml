name: Claude Code Review

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize]

jobs:
  Code-Review:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 자동 수정 커밋을 위한 쓰기 권한
      pull-requests: write # 리뷰 코멘트 작성 권한
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리 필요 (diff 추출용)
          ref: ${{ github.head_ref }} # PR 브랜치 체크아웃

      - name: Extract Diff
        id: diff
        run: |
          git diff origin/main...HEAD \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' \
            ':!*.test.ts' ':!*.test.tsx' \
            ':!*.config.*' \
            ':!**/generated/**' \
            ':!**/*.d.ts' \
            | head -c 6000 > diff.txt

          # diff가 비어있으면 스킵 플래그 설정
          if [ ! -s diff.txt ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Claude Code Review & Auto Fix
        if: steps.diff.outputs.empty == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/code-review.js
