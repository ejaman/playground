name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"

jobs:
  Check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Caching for Turborepo
        uses: rharkor/caching-for-turbo@v2.1.0

      - name: Type Check & Lint (Turborepo)
        run: pnpm turbo run check-types lint

  Deploy-Blog:
    needs: Check
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BLOG }}
    steps:
      - name: Check blog-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            blog:
              - "apps/blog/**"
              - "packages/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "turbo.json"

      - name: Checkout Repository
        if: steps.filter.outputs.blog == 'true'
        uses: actions/checkout@v4

      - name: Install pnpm
        if: steps.filter.outputs.blog == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        if: steps.filter.outputs.blog == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        if: steps.filter.outputs.blog == 'true'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.filter.outputs.blog == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: steps.filter.outputs.blog == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.filter.outputs.blog == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  Deploy-Portfolio:
    needs: Check
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PORTFOLIO }}
    steps:
      - name: Check portfolio-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            portfolio:
              - "apps/portfolio/**"
              - "packages/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "turbo.json"

      - name: Checkout Repository
        if: steps.filter.outputs.portfolio == 'true'
        uses: actions/checkout@v4

      - name: Install pnpm
        if: steps.filter.outputs.portfolio == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        if: steps.filter.outputs.portfolio == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        if: steps.filter.outputs.portfolio == 'true'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.filter.outputs.portfolio == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: steps.filter.outputs.portfolio == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.filter.outputs.portfolio == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
