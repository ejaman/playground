name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
  workflow_dispatch:
    inputs:
      target:
        description: "배포 대상 (blog / portfolio / all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - blog
          - portfolio

jobs:
  Check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Caching for Turborepo
        uses: rharkor/caching-for-turbo@v2.1.0

      - name: Type Check & Lint (Turborepo)
        run: pnpm turbo run check-types lint

  Deploy-Blog:
    needs: Check
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BLOG }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check blog-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            blog:
              - "apps/blog/**"
              - "packages/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "turbo.json"

      - name: Install pnpm
        if: steps.filter.outputs.blog == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'blog' || github.event.inputs.target == 'all'))
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        if: steps.filter.outputs.blog == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'blog' || github.event.inputs.target == 'all'))
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        if: steps.filter.outputs.blog == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'blog' || github.event.inputs.target == 'all'))
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.filter.outputs.blog == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'blog' || github.event.inputs.target == 'all'))
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: steps.filter.outputs.blog == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'blog' || github.event.inputs.target == 'all'))
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.filter.outputs.blog == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'blog' || github.event.inputs.target == 'all'))
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  Deploy-Portfolio:
    needs: Check
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PORTFOLIO }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check portfolio-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            portfolio:
              - "apps/portfolio/**"
              - "packages/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "turbo.json"

      - name: Install pnpm
        if: steps.filter.outputs.portfolio == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'portfolio' || github.event.inputs.target == 'all'))
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        if: steps.filter.outputs.portfolio == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'portfolio' || github.event.inputs.target == 'all'))
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        if: steps.filter.outputs.portfolio == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'portfolio' || github.event.inputs.target == 'all'))
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.filter.outputs.portfolio == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'portfolio' || github.event.inputs.target == 'all'))
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: steps.filter.outputs.portfolio == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'portfolio' || github.event.inputs.target == 'all'))
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.filter.outputs.portfolio == 'true' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'portfolio' || github.event.inputs.target == 'all'))
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
